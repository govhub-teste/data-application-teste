version: 2

models:

  - name: ted_resumo_orcamentario
    description: >
      Tabela gold de consolidação orçamentária e financeira por Plano de Ação TED do MIR.
      Agrega em uma única linha por (plano_acao, num_transf) os valores provenientes de
      quatro fontes distintas: o valor total pactuado no plano (TransfereGov), os créditos
      orçamentários descentralizados via Notas de Crédito (SIAFI), os empenhos registrados
      nas Notas de Empenho (SIAFI) e os recursos financeiros liberados via Programações
      Financeiras (SIAFI + TransfereGov). As quatro dimensões são combinadas via FULL JOIN
      para garantir que nenhum registro seja perdido mesmo que exista em apenas uma fonte.
    meta:
      tags:
        - gold
    columns:
      - name: plano_acao
        description: >
          Identificador único do Plano de Ação no TransfereGov. Chave primária junto com num_transf.
      - name: num_transf
        description: >
          Número da transferência TED — o elo entre os sistemas SIAFI e TransfereGov.
          É o campo que conecta NCs, NEs e PFs do SIAFI ao Plano de Ação correspondente.
      - name: sigla_unidade_descentralizada
        description: >
          Sigla da unidade receptora dos recursos, conforme cadastrado no Plano de Ação do TransfereGov.
      - name: valor_firmado
        description: >
          Valor total pactuado no Plano de Ação (vl_total_plano_acao), conforme o registro
          mais recente no TransfereGov. Representa o compromisso financeiro acordado.
      - name: orcamento_recebido
        description: >
          Soma dos valores de Notas de Crédito recebidas (eventos que não são 300301/300307),
          representando o crédito orçamentário efetivamente descentralizado para o MIR.
      - name: orcamento_devolvido
        description: >
          Soma dos valores de Notas de Crédito de eventos 300301 e 300307,
          representando crédito orçamentário devolvido ao órgão concedente.
      - name: empenhado
        description: >
          Soma dos valores positivos de despesas_empenhadas — empenhos formalizados,
          excluindo anulações.
      - name: empenho_anulado
        description: >
          Soma dos valores absolutos das despesas_empenhadas negativas — empenhos
          cancelados ou revertidos após a emissão.
      - name: despesas_pagas_exercicio
        description: >
          Total de despesas pagas no exercício corrente, proveniente do campo
          despesas_pagas das Notas de Empenho.
      - name: despesas_pagas_rap
        description: >
          Total de despesas pagas via Restos a Pagar (exercícios anteriores),
          proveniente de restos_a_pagar_pagos das Notas de Empenho.
      - name: restos_a_pagar
        description: >
          Valor total inscrito como Restos a Pagar — despesas empenhadas e não
          pagas até o encerramento do exercício fiscal.
      - name: despesas_liquidada
        description: >
          Soma das despesas liquidadas — despesas com bens ou serviços
          efetivamente entregues e atestados.
      - name: financeiro_recebido
        description: >
          Soma dos valores de Programações Financeiras com ação 'TRANSFERENCIA',
          representando os recursos financeiros efetivamente recebidos pelo MIR.
      - name: financeiro_devolvido
        description: >
          Soma dos valores de Programações Financeiras com ação 'DEVOLUCAO',
          representando recursos financeiros devolvidos ao concedente.
      - name: financeiro_cancelado
        description: >
          Soma dos valores de Programações Financeiras com ação 'CANCELAMENTO',
          representando programações canceladas antes de seu processamento.
      - name: dt_ingest
        description: >
          Timestamp mais recente de ingestão entre todas as fontes que compõem o registro
          (planos_acao_ted, nc_plano_acao, empenhos_por_plano_acao, pf_unificado).
          Indica quando os dados foram atualizados pela última vez (UTC-3).
      - name: sigla_unidade_responsavel_acompanhamento
        description: >
          Sigla da unidade responsável pelo acompanhamento do programa, proveniente
          de programas_ted (TransfereGov).
      - name: tx_nome_institucional_programa
        description: >
          Nome institucional do programa ao qual o Plano de Ação está vinculado,
          proveniente de programas_ted (TransfereGov).
      - name: tx_objetivo_programa
        description: >
          Descrição do objetivo do programa, proveniente de programas_ted (TransfereGov).
      - name: programa_governo
        description: >
          Código do programa de governo conforme classificação orçamentária SIAFI,
          proveniente de nc_plano_acao.
      - name: programa_governo_descricao
        description: >
          Descrição do programa de governo conforme classificação orçamentária SIAFI,
          proveniente de nc_plano_acao.
    tests:
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.ted_resumo_orcamentario'
          nome_coluna: 'plano_acao'
          tipo_esperado: 'integer'
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.ted_resumo_orcamentario'
          nome_coluna: 'valor_firmado'
          tipo_esperado: 'numeric'
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.ted_resumo_orcamentario'
          nome_coluna: 'empenhado'
          tipo_esperado: 'numeric'
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.ted_resumo_orcamentario'
          nome_coluna: 'dt_ingest'
          tipo_esperado: 'timestamp with time zone'

  - name: ted_empenhos_plano_acao
    description: >
      Tabela gold de Notas de Empenho do SIAFI vinculadas a Planos de Ação TED do MIR.
      Filtra empenhos_por_plano_acao mantendo apenas os registros com plano_acao não nulo,
      ou seja, NEs cujo número de transferência TED foi identificado e possui correspondência
      no TransfereGov. Remove as colunas operacionais do pipeline de extração (complemento_ted,
      num_ted, numero_base, ano_raw, ano_normalizado, ano_oficial, numero_ted_normalizado,
      num_transf_pa), expondo somente os campos de negócio.
    meta:
      tags:
        - gold
    columns:
      - name: emissao_mes
        description: "Mês de emissão da NE no SIAFI."
      - name: emissao_dia
        description: "Data de emissão da NE no SIAFI."
      - name: ne_ccor
        description: "Chave completa da Nota de Empenho no SIAFI."
      - name: ne_num_processo
        description: "Número do processo administrativo associado à NE, limpo de pontos, barras e hifens."
      - name: ne_info_complementar
        description: "Campo complementar da NE."
      - name: ne_ccor_descricao
        description: "Descrição livre da NE — campo principal de onde os métodos de extração identificam o num_transf via regex."
      - name: doc_observacao
        description: "Campo de observação do documento associado à NE."
      - name: natureza_despesa
        description: "Código da natureza de despesa da NE (ex: 339030)."
      - name: natureza_despesa_descricao
        description: "Descrição da natureza de despesa da NE."
      - name: ne_ccor_favorecido
        description: "CNPJ ou CPF do favorecido do empenho, padronizado em maiúsculas."
      - name: ne_ccor_favorecido_descricao
        description: "Nome ou razão social do favorecido da NE."
      - name: ne_ccor_ano_emissao
        description: "Ano de emissão da NE (integer, YYYY)."
      - name: ptres
        description: "Programa de Trabalho Resumido (PTRES) vinculado à NE no SIAFI."
      - name: fonte_recursos_detalhada
        description: "Código detalhado da fonte de recursos da NE."
      - name: fonte_recursos_detalhada_descricao
        description: "Descrição da fonte de recursos da NE."
      - name: despesas_empenhadas
        description: "Valor empenhado da NE (numeric 15,2). Positivo = novo empenho; negativo = anulação."
      - name: despesas_liquidadas
        description: "Valor liquidado (numeric 15,2) — despesas com bens ou serviços confirmados como entregues."
      - name: despesas_pagas
        description: "Valor efetivamente pago no exercício corrente (numeric 15,2)."
      - name: restos_a_pagar_inscritos
        description: "Valor inscrito em Restos a Pagar (numeric 15,2) — empenhado e não pago até o encerramento do exercício."
      - name: restos_a_pagar_pagos
        description: "Valor de Restos a Pagar efetivamente quitado (numeric 15,2)."
      - name: ne
        description: "Identificador curto da Nota de Empenho — últimos 12 caracteres de ne_ccor."
      - name: orgao_id
        description: "Código do órgão emitente da NE — primeiros 6 caracteres de ne_ccor."
      - name: nc
        description: "Número da Nota de Crédito associada à NE, extraído de ne_ccor_descricao e formatado pela UDF format_nc."
      - name: num_transf
        description: "Número da transferência TED extraído da NE. Chave de ligação com o Plano de Ação no TransfereGov."
      - name: plano_acao
        description: >
          Identificador do Plano de Ação no TransfereGov (integer), obtido via ponte
          num_transf_n_plano_acao a partir do num_transf. Nunca nulo nesta tabela gold —
          o filtro plano_acao is not null é a condição de entrada.
      - name: dt_ingest
        description: "Timestamp de ingestão da NE no SIAFI (timestamptz, UTC-3)."
    tests:
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.ted_empenhos_plano_acao'
          nome_coluna: 'plano_acao'
          tipo_esperado: 'integer'
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.ted_empenhos_plano_acao'
          nome_coluna: 'ne_ccor_ano_emissao'
          tipo_esperado: 'integer'
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.ted_empenhos_plano_acao'
          nome_coluna: 'despesas_empenhadas'
          tipo_esperado: 'numeric'
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.ted_empenhos_plano_acao'
          nome_coluna: 'despesas_liquidadas'
          tipo_esperado: 'numeric'
      - verificacao_tipagem:
          nome_tabela: 'siafi_dbt.ted_empenhos_plano_acao'
          nome_coluna: 'restos_a_pagar_inscritos'
          tipo_esperado: 'numeric'